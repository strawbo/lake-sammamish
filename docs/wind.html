<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
    (function() {
        var d = new Date().toISOString().slice(0, 10);
        if (location.search.indexOf('v=' + d) === -1) {
            location.replace(location.pathname + '?v=' + d);
        }
    })();
    </script>
    <title>Lake Sammamish Wind Map</title>
    <link rel="stylesheet" href="wind-style.css">
</head>
<body>
    <nav class="site-nav">
        <a href="/lake-sammamish" class="nav-link">Swim Score</a>
        <a href="/lake-sammamish/seasonal.html" class="nav-link">Seasonal Outlook</a>
        <a href="/lake-sammamish/wind.html" class="nav-link active">Wind Map</a>
    </nav>

    <div class="map-container" id="mapContainer">
        <div class="map-overlay top" id="mapHeader">
            <span id="subtitle" class="overlay-subtitle">Loading...</span>
            <span id="last-updated" class="overlay-timestamp"></span>
        </div>
        <div class="recommendation-card" id="recommendation">
            <div class="rec-badge" id="recBadge"></div>
            <div class="rec-text">
                <div class="rec-title" id="recTitle"></div>
                <div class="rec-detail" id="recDetail"></div>
            </div>
        </div>
    </div>

    <script src="wind-app.js"></script>
</body>
</html>
